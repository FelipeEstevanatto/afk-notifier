<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f5f7;
            margin: 0;
            padding: 32px 16px;
            color: #1a1a2e;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
        }

        .header {
            background: #0d3b2e;
            padding: 28px 32px;
        }

            .header h1 {
                color: #34d399;
                margin: 0 0 4px;
                font-size: 22px;
                font-weight: 700;
            }

            .header p {
                color: #8892b0;
                margin: 0;
                font-size: 13px;
            }

        .badge {
            display: inline-block;
            background: #34d399;
            color: #0d3b2e;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .5px;
            margin-bottom: 10px;
        }

        .body {
            padding: 28px 32px;
            font-size: 14px;
            color: #374151;
            line-height: 1.6;
        }

        .big {
            font-size: 36px;
            font-weight: 700;
            color: #0d3b2e;
            display: block;
            margin: 8px 0 4px;
        }

        .footer {
            background: #f8f9fc;
            padding: 16px 32px;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            border-top: 1px solid #e8eaf0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <span class="badge">✔ USUÁRIO RETORNOU</span>
            <h1>Sessão retomada</h1>
            <p>Retorno detectado em {{ReturnedAt}}</p>
        </div>
        <div class="body">
            <p>
                O usuário <strong>{{UserName}}</strong> retornou à máquina
                <strong>{{MachineName}}</strong> após ficar ausente por:
            </p>
            <span class="big">{{AbsentDuration}}</span>
            <p style="color:#6b7280;font-size:13px;">
                Ausência registrada das {{DetectedAtHour}} até {{ReturnedAtHour}}.
            </p>
        </div>
        <div class="footer">Gerado por <strong>AfkNotifier</strong> · {{Year}}</div>
    </div>
</body>
</html>
